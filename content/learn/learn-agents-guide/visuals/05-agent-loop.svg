<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="800" height="480" fill="#fafafa" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="600" fill="#1a1a1a">The Agent Loop (ReAct Pattern)</text>
  <text x="400" y="56" text-anchor="middle" font-size="13" fill="#6b7280">Reason → Act → Observe → Repeat until done</text>

  <!-- REASON node -->
  <g transform="translate(120, 120)">
    <rect width="160" height="90" rx="10" fill="white" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
    <rect width="160" height="28" rx="10" ry="0" fill="#8b5cf6"/>
    <rect width="160" height="28" rx="10" fill="#8b5cf6"/>
    <rect y="18" width="160" height="10" fill="#8b5cf6"/>
    <text x="80" y="19" text-anchor="middle" font-size="11" font-weight="600" fill="white">REASON</text>
    <text x="80" y="52" text-anchor="middle" font-size="10" fill="#374151">"What do I know?</text>
    <text x="80" y="66" text-anchor="middle" font-size="10" fill="#374151">What do I need?</text>
    <text x="80" y="80" text-anchor="middle" font-size="10" fill="#374151">What tool should I use?"</text>
  </g>

  <!-- ACT node -->
  <g transform="translate(400, 120)">
    <rect width="160" height="90" rx="10" fill="white" stroke="#0ea5e9" stroke-width="2" filter="url(#shadow)"/>
    <rect width="160" height="28" rx="10" fill="#0ea5e9"/>
    <rect y="18" width="160" height="10" fill="#0ea5e9"/>
    <text x="80" y="19" text-anchor="middle" font-size="11" font-weight="600" fill="white">ACT</text>
    <text x="80" y="52" text-anchor="middle" font-size="10" fill="#374151">Call a tool:</text>
    <text x="80" y="66" text-anchor="middle" font-size="10" fill="#6b7280" font-style="italic">search_contacts()</text>
    <text x="80" y="80" text-anchor="middle" font-size="10" fill="#6b7280" font-style="italic">query_database()</text>
  </g>

  <!-- OBSERVE node -->
  <g transform="translate(400, 280)">
    <rect width="160" height="90" rx="10" fill="white" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
    <rect width="160" height="28" rx="10" fill="#10b981"/>
    <rect y="18" width="160" height="10" fill="#10b981"/>
    <text x="80" y="19" text-anchor="middle" font-size="11" font-weight="600" fill="white">OBSERVE</text>
    <text x="80" y="52" text-anchor="middle" font-size="10" fill="#374151">See the tool result:</text>
    <text x="80" y="66" text-anchor="middle" font-size="10" fill="#6b7280" font-style="italic">"Found: Dr. Patel,</text>
    <text x="80" y="80" text-anchor="middle" font-size="10" fill="#6b7280" font-style="italic">Cardiology, ID: 4829"</text>
  </g>

  <!-- DONE node -->
  <g transform="translate(620, 190)">
    <rect width="130" height="60" rx="30" fill="white" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
    <text x="65" y="28" text-anchor="middle" font-size="11" font-weight="600" fill="#b45309">✅ RESPOND</text>
    <text x="65" y="44" text-anchor="middle" font-size="10" fill="#6b7280">Deliver answer</text>
  </g>

  <!-- Arrows -->
  <!-- Reason → Act -->
  <line x1="282" y1="165" x2="398" y2="165" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrowDark)"/>

  <!-- Act → Decision diamond area -->
  <!-- Act → Observe (needs more info) -->
  <line x1="480" y1="212" x2="480" y2="278" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrowDark)"/>
  <text x="490" y="248" font-size="9" fill="#6b7280">tool called</text>

  <!-- Act → Done (no tool needed) -->
  <line x1="562" y1="165" x2="618" y2="200" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowAmber2)"/>
  <text x="600" y="172" font-size="9" fill="#f59e0b">done!</text>

  <!-- Observe → Reason (loop back) -->
  <path d="M 398,325 L 200,325 L 200,212" fill="none" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrowDark)"/>
  <text x="280" y="318" font-size="9" fill="#6b7280">need more info → loop</text>

  <!-- Observe → Done (have enough) -->
  <path d="M 562,325 L 685,325 L 685,252" fill="none" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowAmber2)"/>
  <text x="700" y="300" font-size="9" fill="#f59e0b">enough</text>
  <text x="700" y="312" font-size="9" fill="#f59e0b">info!</text>

  <!-- User input arrow -->
  <g transform="translate(40, 150)">
    <text x="0" y="0" font-size="10" fill="#818cf8" font-weight="500">User</text>
    <text x="0" y="14" font-size="10" fill="#818cf8" font-weight="500">request</text>
    <line x1="45" y1="7" x2="75" y2="7" stroke="#818cf8" stroke-width="1.5" marker-end="url(#arrowPurple2)"/>
  </g>

  <!-- Bottom annotation -->
  <g transform="translate(100, 430)">
    <rect width="600" height="36" rx="6" fill="white" stroke="#e5e7eb" stroke-width="1"/>
    <text x="300" y="15" text-anchor="middle" font-size="10" fill="#374151" font-weight="500">Most tasks take 2–5 loops. Complex tasks might take 10–20.</text>
    <text x="300" y="29" text-anchor="middle" font-size="10" fill="#9ca3af">Each loop is a separate model call — that's why agents take a few seconds, not milliseconds.</text>
  </g>

  <defs>
    <marker id="arrowDark" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#6b7280" stroke-width="1.5"/>
    </marker>
    <marker id="arrowAmber2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
    </marker>
    <marker id="arrowPurple2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#818cf8" stroke-width="1.5"/>
    </marker>
  </defs>
</svg>