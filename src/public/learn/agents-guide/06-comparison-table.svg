<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="800" height="520" fill="#fafafa" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="600" fill="#1a1a1a">Same Engine, Different Cars</text>
  <text x="400" y="56" text-anchor="middle" font-size="13" fill="#6b7280">All three use Claude Sonnet. The harness makes them different products.</text>

  <!-- Three cards -->
  <!-- Card 1: Claude.ai -->
  <g transform="translate(40, 80)">
    <rect width="226" height="410" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1" filter="url(#shadow)"/>

    <!-- Header -->
    <rect width="226" height="60" rx="10" fill="#f5f3ff"/>
    <rect y="50" width="226" height="10" fill="#f5f3ff"/>
    <text x="113" y="28" text-anchor="middle" font-size="24">🚗</text>
    <text x="113" y="50" text-anchor="middle" font-size="13" font-weight="600" fill="#4338ca">Claude.ai</text>

    <!-- Type label -->
    <rect x="60" y="70" width="106" height="22" rx="11" fill="#ede9fe"/>
    <text x="113" y="85" text-anchor="middle" font-size="10" font-weight="500" fill="#6d28d9">The Sedan</text>

    <!-- Features -->
    <g transform="translate(20, 108)">
      <text x="0" y="0" font-size="10" font-weight="600" fill="#374151">Tools</text>
      <text x="0" y="18" font-size="10" fill="#6b7280">Web search (limited)</text>
      <text x="0" y="33" font-size="10" fill="#6b7280">File analysis (uploads)</text>
      <text x="0" y="48" font-size="10" fill="#6b7280">Code sandbox</text>

      <text x="0" y="76" font-size="10" font-weight="600" fill="#374151">Context</text>
      <text x="0" y="94" font-size="10" fill="#6b7280">Chat history</text>
      <text x="0" y="109" font-size="10" fill="#6b7280">Uploaded docs</text>
      <text x="0" y="124" font-size="10" fill="#6b7280">Memory feature</text>

      <text x="0" y="152" font-size="10" font-weight="600" fill="#374151">Can't do</text>
      <text x="0" y="170" font-size="10" fill="#ef4444">✗ Access your files</text>
      <text x="0" y="185" font-size="10" fill="#ef4444">✗ Run commands</text>
      <text x="0" y="200" font-size="10" fill="#ef4444">✗ Connect to systems</text>
      <text x="0" y="215" font-size="10" fill="#ef4444">✗ Background tasks</text>
    </g>

    <!-- Autonomy meter -->
    <g transform="translate(20, 348)">
      <text x="0" y="0" font-size="10" font-weight="500" fill="#374151">Autonomy</text>
      <rect x="0" y="10" width="186" height="8" rx="4" fill="#f1f5f9"/>
      <rect x="0" y="10" width="37" height="8" rx="4" fill="#818cf8"/>
      <text x="0" y="32" font-size="9" fill="#9ca3af">Low — you drive everything</text>
    </g>

    <!-- Best for -->
    <g transform="translate(20, 390)">
      <text x="93" y="0" text-anchor="middle" font-size="9" fill="#6b7280" font-style="italic">Writing, brainstorming, Q&amp;A</text>
    </g>
  </g>

  <!-- Card 2: Claude Desktop -->
  <g transform="translate(287, 80)">
    <rect width="226" height="410" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1" filter="url(#shadow)"/>

    <rect width="226" height="60" rx="10" fill="#ecfdf5"/>
    <rect y="50" width="226" height="10" fill="#ecfdf5"/>
    <text x="113" y="28" text-anchor="middle" font-size="24">🚙</text>
    <text x="113" y="50" text-anchor="middle" font-size="13" font-weight="600" fill="#065f46">Claude Desktop</text>

    <rect x="50" y="70" width="126" height="22" rx="11" fill="#d1fae5"/>
    <text x="113" y="85" text-anchor="middle" font-size="10" font-weight="500" fill="#047857">The SUV (+ MCP)</text>

    <g transform="translate(20, 108)">
      <text x="0" y="0" font-size="10" font-weight="600" fill="#374151">Tools</text>
      <text x="0" y="18" font-size="10" fill="#10b981">✓ Everything above, plus:</text>
      <text x="0" y="33" font-size="10" fill="#6b7280">Local file access</text>
      <text x="0" y="48" font-size="10" fill="#6b7280">MCP servers (any tool)</text>

      <text x="0" y="76" font-size="10" font-weight="600" fill="#374151">Context</text>
      <text x="0" y="94" font-size="10" fill="#6b7280">Chat history</text>
      <text x="0" y="109" font-size="10" fill="#6b7280">Local files via MCP</text>
      <text x="0" y="124" font-size="10" fill="#6b7280">Project docs</text>

      <text x="0" y="152" font-size="10" font-weight="600" fill="#374151">Can't do</text>
      <text x="0" y="170" font-size="10" fill="#ef4444">✗ Run shell commands</text>
      <text x="0" y="185" font-size="10" fill="#ef4444">✗ Background tasks</text>
      <text x="0" y="200" font-size="10" fill="#ef4444">✗ Browser automation</text>
      <text x="0" y="215" font-size="10" fill="#6b7280"> </text>
    </g>

    <g transform="translate(20, 348)">
      <text x="0" y="0" font-size="10" font-weight="500" fill="#374151">Autonomy</text>
      <rect x="0" y="10" width="186" height="8" rx="4" fill="#f1f5f9"/>
      <rect x="0" y="10" width="93" height="8" rx="4" fill="#10b981"/>
      <text x="0" y="32" font-size="9" fill="#9ca3af">Medium — shared control</text>
    </g>

    <g transform="translate(20, 390)">
      <text x="93" y="0" text-anchor="middle" font-size="9" fill="#6b7280" font-style="italic">Research, local files, custom tools</text>
    </g>
  </g>

  <!-- Card 3: Claude Code -->
  <g transform="translate(534, 80)">
    <rect width="226" height="410" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1" filter="url(#shadow)"/>

    <rect width="226" height="60" rx="10" fill="#fff7ed"/>
    <rect y="50" width="226" height="10" fill="#fff7ed"/>
    <text x="113" y="28" text-anchor="middle" font-size="24">🛻</text>
    <text x="113" y="50" text-anchor="middle" font-size="13" font-weight="600" fill="#9a3412">Claude Code</text>

    <rect x="40" y="70" width="146" height="22" rx="11" fill="#ffedd5"/>
    <text x="113" y="85" text-anchor="middle" font-size="10" font-weight="500" fill="#c2410c">The Off-Road Truck</text>

    <g transform="translate(20, 108)">
      <text x="0" y="0" font-size="10" font-weight="600" fill="#374151">Tools</text>
      <text x="0" y="18" font-size="10" fill="#10b981">✓ Everything above, plus:</text>
      <text x="0" y="33" font-size="10" fill="#6b7280">Full shell access</text>
      <text x="0" y="48" font-size="10" fill="#6b7280">Browser automation</text>

      <text x="0" y="76" font-size="10" font-weight="600" fill="#374151">Context</text>
      <text x="0" y="94" font-size="10" fill="#6b7280">Full codebase awareness</text>
      <text x="0" y="109" font-size="10" fill="#6b7280">Git history</text>
      <text x="0" y="124" font-size="10" fill="#6b7280">CLAUDE.md instructions</text>

      <text x="0" y="152" font-size="10" font-weight="600" fill="#374151">Considerations</text>
      <text x="0" y="170" font-size="10" fill="#f59e0b">⚡ Can run any command</text>
      <text x="0" y="185" font-size="10" fill="#f59e0b">⚡ High autonomy</text>
      <text x="0" y="200" font-size="10" fill="#f59e0b">⚡ Needs oversight</text>
      <text x="0" y="215" font-size="10" fill="#6b7280"> </text>
    </g>

    <g transform="translate(20, 348)">
      <text x="0" y="0" font-size="10" font-weight="500" fill="#374151">Autonomy</text>
      <rect x="0" y="10" width="186" height="8" rx="4" fill="#f1f5f9"/>
      <rect x="0" y="10" width="158" height="8" rx="4" fill="#f97316"/>
      <text x="0" y="32" font-size="9" fill="#9ca3af">High — agent drives, you supervise</text>
    </g>

    <g transform="translate(20, 390)">
      <text x="93" y="0" text-anchor="middle" font-size="9" fill="#6b7280" font-style="italic">Coding, deploys, system admin</text>
    </g>
  </g>
</svg>