<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="engineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="harnessGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0.03"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#fafafa" rx="12"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-size="18" font-weight="600" fill="#1a1a1a">The Engine vs. The Car</text>
  <text x="400" y="62" text-anchor="middle" font-size="13" fill="#6b7280">Same engine. Different car. Completely different experience.</text>

  <!-- LEFT: Engine Only -->
  <g transform="translate(40, 90)">
    <rect width="320" height="370" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1" filter="url(#shadow)"/>
    <text x="160" y="32" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">Just the Engine</text>
    <text x="160" y="50" text-anchor="middle" font-size="11" fill="#9ca3af">LLM with no harness</text>

    <!-- Engine box -->
    <rect x="70" y="75" width="180" height="80" rx="8" fill="url(#engineGrad)" stroke="#f97316" stroke-width="1.5"/>
    <text x="160" y="108" text-anchor="middle" font-size="13" font-weight="500" fill="#c2410c">LLM</text>
    <text x="160" y="126" text-anchor="middle" font-size="11" fill="#9a3412">"Predict next word"</text>

    <!-- Input/Output arrows -->
    <line x1="30" y1="115" x2="68" y2="115" stroke="#d1d5db" stroke-width="1.5" marker-end="url(#arrowGray)"/>
    <text x="10" y="110" font-size="9" fill="#9ca3af">Text</text>
    <text x="10" y="122" font-size="9" fill="#9ca3af">in</text>
    <line x1="252" y1="115" x2="290" y2="115" stroke="#d1d5db" stroke-width="1.5" marker-end="url(#arrowGray)"/>
    <text x="292" y="110" font-size="9" fill="#9ca3af">Text</text>
    <text x="292" y="122" font-size="9" fill="#9ca3af">out</text>

    <!-- Can't do list -->
    <g transform="translate(40, 185)">
      <text x="0" y="0" font-size="11" font-weight="500" fill="#6b7280">What it can't do:</text>
      <text x="0" y="24" font-size="11" fill="#ef4444">✗</text><text x="18" y="24" font-size="11" fill="#6b7280">Remember conversations</text>
      <text x="0" y="44" font-size="11" fill="#ef4444">✗</text><text x="18" y="44" font-size="11" fill="#6b7280">Read your files</text>
      <text x="0" y="64" font-size="11" fill="#ef4444">✗</text><text x="18" y="64" font-size="11" fill="#6b7280">Search the internet</text>
      <text x="0" y="84" font-size="11" fill="#ef4444">✗</text><text x="18" y="84" font-size="11" fill="#6b7280">Send emails</text>
      <text x="0" y="104" font-size="11" fill="#ef4444">✗</text><text x="18" y="104" font-size="11" fill="#6b7280">Query databases</text>
      <text x="0" y="124" font-size="11" fill="#ef4444">✗</text><text x="18" y="124" font-size="11" fill="#6b7280">Take any real-world action</text>
    </g>
  </g>

  <!-- Arrow between -->
  <text x="400" y="280" text-anchor="middle" font-size="24" fill="#d1d5db">→</text>

  <!-- RIGHT: Full Car -->
  <g transform="translate(440, 90)">
    <rect width="320" height="370" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1" filter="url(#shadow)"/>
    <text x="160" y="32" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">The Full Agent</text>
    <text x="160" y="50" text-anchor="middle" font-size="11" fill="#9ca3af">LLM + Harness + Tools</text>

    <!-- Harness wrapper -->
    <rect x="25" y="65" width="270" height="200" rx="10" fill="url(#harnessGrad)" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="160" y="82" text-anchor="middle" font-size="10" font-weight="500" fill="#0284c7" letter-spacing="1">HARNESS</text>

    <!-- Engine inside harness -->
    <rect x="90" y="92" width="140" height="44" rx="6" fill="url(#engineGrad)" stroke="#f97316" stroke-width="1.2"/>
    <text x="160" y="118" text-anchor="middle" font-size="12" font-weight="500" fill="#c2410c">LLM</text>

    <!-- Components around engine -->
    <rect x="40" y="150" width="100" height="32" rx="5" fill="white" stroke="#0ea5e9" stroke-width="1"/>
    <text x="90" y="170" text-anchor="middle" font-size="10" fill="#0369a1">System Prompt</text>

    <rect x="155" y="150" width="80" height="32" rx="5" fill="white" stroke="#0ea5e9" stroke-width="1"/>
    <text x="195" y="170" text-anchor="middle" font-size="10" fill="#0369a1">Context</text>

    <rect x="40" y="195" width="80" height="32" rx="5" fill="white" stroke="#0ea5e9" stroke-width="1"/>
    <text x="80" y="215" text-anchor="middle" font-size="10" fill="#0369a1">Memory</text>

    <rect x="135" y="195" width="80" height="32" rx="5" fill="white" stroke="#0ea5e9" stroke-width="1"/>
    <text x="175" y="215" text-anchor="middle" font-size="10" fill="#0369a1">Tools</text>

    <rect x="230" y="195" width="52" height="32" rx="5" fill="white" stroke="#0ea5e9" stroke-width="1"/>
    <text x="256" y="215" text-anchor="middle" font-size="10" fill="#0369a1">Loop</text>

    <!-- Can do list -->
    <g transform="translate(40, 285)">
      <text x="0" y="0" font-size="11" font-weight="500" fill="#6b7280">What it can do:</text>
      <text x="0" y="24" font-size="11" fill="#10b981">✓</text><text x="18" y="24" font-size="11" fill="#374151">Remember across sessions</text>
      <text x="0" y="44" font-size="11" fill="#10b981">✓</text><text x="18" y="44" font-size="11" fill="#374151">Read &amp; write files</text>
      <text x="0" y="64" font-size="11" fill="#10b981">✓</text><text x="18" y="64" font-size="11" fill="#374151">Search, browse, query, email</text>
    </g>
  </g>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#d1d5db" stroke-width="1"/>
    </marker>
  </defs>
</svg>